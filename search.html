<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-4">
<h3>🔍 البحث</h3>

<form method="POST">
<input name="name" class="form-control" placeholder="اسم اللاعب">
<button class="btn btn-primary mt-2">بحث</button>
</form>

<ul class="mt-3">
{% for r in results %}
<li>{{ r[1] }} - {{ r[2] }} درهم</li>
{% endfor %}
</ul>

<a href="/" class="btn btn-secondary">رجوع</a>
</div>
