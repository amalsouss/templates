<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-4">

<h3>📊 Dashboard</h3>

<div class="row">
<div class="col">
<div class="card p-3 bg-success text-white">💰 {{ total }} درهم</div>
</div>

<div class="col">
<div class="card p-3 bg-primary text-white">👥 {{ players }} لاعب</div>
</div>
</div>

<table class="table mt-4">
<tr>
<th>الاسم</th>
<th>المبلغ</th>
<th>PDF</th>
<th>WhatsApp</th>
</tr>

{% for r in rows %}
<tr>
<td>{{ r[1] }}</td>
<td>{{ r[2] }}</td>

<td>
<a href="/pdf/{{ r[0] }}" class="btn btn-sm btn-dark">PDF</a>
</td>

<td>
<a href="/whatsapp/{{ r[0] }}" class="btn btn-sm btn-success">WhatsApp</a>
</td>

</tr>
{% endfor %}
</table>

<a href="/" class="btn btn-secondary">رجوع</a>
</div>
